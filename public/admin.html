<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE LIFE COINCOIN - Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-gray-100 font-sans leading-normal tracking-normal h-screen flex flex-col">

    <!-- Navigation -->
    <nav class="bg-red-800 p-4 shadow-lg w-full flex-none">
        <div class="container mx-auto flex items-center justify-between">
            <a class="text-white font-bold text-xl" href="/">ADMIN DASHBOARD</a>
            <div id="nav-actions">
                <button id="login-btn" class="bg-white text-red-800 font-bold py-2 px-4 rounded hover:bg-gray-200">Admin Login</button>
                <div id="user-info" class="hidden text-white font-bold items-center">
                    <span id="user-email" class="mr-4">Admin Mode</span>
                    <button id="logout-btn" class="bg-red-500 text-white font-bold py-2 px-4 rounded hover:bg-red-700">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container mx-auto mt-8 flex-grow">
        <!-- Login Section -->
        <section id="login-section" class="max-w-md mx-auto bg-white p-8 rounded shadow hidden">
            <h2 class="text-2xl font-bold mb-4 text-center text-red-800">Admin Login</h2>
            <form id="login-form">
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="email">Admin Email</label>
                    <input class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" id="email" type="email" placeholder="admin@example.com" required>
                </div>
                <div class="mb-6">
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="password">Password</label>
                    <input class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 mb-3 leading-tight focus:outline-none focus:shadow-outline" id="password" type="password" placeholder="******************" required>
                </div>
                <div class="flex items-center justify-between">
                    <button class="bg-red-800 hover:bg-red-900 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline" type="submit">
                        Access Dashboard
                    </button>
                </div>
                <p id="login-error" class="text-red-500 text-xs italic mt-4 hidden"></p>
            </form>
        </section>

        <!-- Admin Dashboard Section -->
        <section id="dashboard-section" class="w-full hidden">
            <h1 class="text-3xl font-bold mb-6 text-gray-800">Marketplace Management</h1>

            <div id="loading" class="text-center text-gray-600 hidden">Loading listings...</div>
            <div id="error" class="text-center text-red-500 hidden">Error loading data.</div>

            <div class="bg-white shadow-md rounded my-6 overflow-x-auto">
                <table class="min-w-max w-full table-auto">
                    <thead>
                        <tr class="bg-gray-200 text-gray-600 uppercase text-sm leading-normal">
                            <th class="py-3 px-6 text-left">Listing ID</th>
                            <th class="py-3 px-6 text-left">Item ID</th>
                            <th class="py-3 px-6 text-left">Seller</th>
                            <th class="py-3 px-6 text-center">Price</th>
                            <th class="py-3 px-6 text-center">Status</th>
                            <th class="py-3 px-6 text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="admin-listings-table" class="text-gray-600 text-sm font-light">
                        <!-- Rows injected via JS -->
                    </tbody>
                </table>
            </div>

            <div class="mt-4 flex justify-between items-center">
                 <button id="refresh-btn" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">Refresh Data</button>
                 <div class="flex">
                    <button id="prev-page" class="bg-gray-300 hover:bg-gray-400 text-gray-800 font-bold py-2 px-4 rounded-l disabled:opacity-50">Prev</button>
                    <span id="page-info" class="px-4 py-2 bg-gray-200 text-gray-700 border-l border-r border-gray-300">Page 1</span>
                    <button id="next-page" class="bg-gray-300 hover:bg-gray-400 text-gray-800 font-bold py-2 px-4 rounded-r disabled:opacity-50">Next</button>
                 </div>
            </div>
        </section>
    </main>

    <script src="/admin.js"></script>
</body>
</html>
