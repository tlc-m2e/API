<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE LIFE COINCOIN - Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-gray-100 font-sans leading-normal tracking-normal h-screen flex flex-col">

    <!-- Navigation -->
    <nav class="bg-blue-600 p-4 shadow-lg w-full flex-none">
        <div class="container mx-auto flex items-center justify-between">
            <a class="text-white font-bold text-xl" href="/">THE LIFE COINCOIN</a>
            <div id="nav-actions">
                <button id="login-btn" class="bg-white text-blue-600 font-bold py-2 px-4 rounded hover:bg-gray-200">Login</button>
                <div id="user-info" class="hidden text-white font-bold items-center">
                    <span id="user-email" class="mr-4"></span>
                    <button id="logout-btn" class="bg-red-500 text-white font-bold py-2 px-4 rounded hover:bg-red-700">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container mx-auto mt-8 flex-grow">
        <!-- Login Section -->
        <section id="login-section" class="max-w-md mx-auto bg-white p-8 rounded shadow hidden">
            <h2 class="text-2xl font-bold mb-4 text-center">Login</h2>
            <form id="login-form">
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="email">Email</label>
                    <input class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" id="email" type="email" placeholder="Email" required>
                </div>
                <div class="mb-6">
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="password">Password</label>
                    <input class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 mb-3 leading-tight focus:outline-none focus:shadow-outline" id="password" type="password" placeholder="******************" required>
                </div>
                <div class="flex items-center justify-between">
                    <button class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline" type="submit">
                        Sign In
                    </button>
                </div>
                <p id="login-error" class="text-red-500 text-xs italic mt-4 hidden"></p>
            </form>
        </section>

        <!-- Marketplace Section -->
        <section id="marketplace-section" class="w-full">
            <h1 class="text-3xl font-bold mb-6 text-gray-800">Marketplace</h1>

            <div id="loading" class="text-center text-gray-600 hidden">Loading...</div>
            <div id="error" class="text-center text-red-500 hidden">Error loading listings.</div>

            <div id="listings-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                <!-- Listings will be injected here via JS -->
            </div>

            <div class="mt-8 flex justify-center">
                <button id="prev-page" class="bg-gray-300 hover:bg-gray-400 text-gray-800 font-bold py-2 px-4 rounded-l disabled:opacity-50">Prev</button>
                <span id="page-info" class="px-4 py-2 bg-gray-200 text-gray-700">Page 1</span>
                <button id="next-page" class="bg-gray-300 hover:bg-gray-400 text-gray-800 font-bold py-2 px-4 rounded-r disabled:opacity-50">Next</button>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="bg-gray-800 p-4 mt-auto">
        <div class="container mx-auto text-center text-white">
            <p>&copy; 2024 THE LIFE COINCOIN</p>
        </div>
    </footer>

    <script src="/user.js"></script>
</body>
</html>
