apiVersion: v1
kind: Secret
metadata:
  name: tlc-tls
  labels:
    app: tlc
type: kubernetes.io/tls
stringData:
  # ATTENTION : Ceci est un template.
  # En production, utilisez des certificats valides (Let's Encrypt, CertManager).
  # Pour le développement local, générez les clés avec docker/generate-certs.sh
  # puis créez ce secret avec :
  # kubectl create secret tls tlc-tls --key docker/nginx/certs/server.key --cert docker/nginx/certs/server.crt
  tls.crt: |
    -----BEGIN CERTIFICATE-----
    (Insérer le contenu du certificat ici)
    -----END CERTIFICATE-----
  tls.key: |
    -----BEGIN PRIVATE KEY-----
    (Insérer le contenu de la clé privée ici)
    -----END PRIVATE KEY-----
