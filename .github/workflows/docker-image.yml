name: Docker Build and Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Setup environment
      run: |
        # On se place dans le dossier de l'API pour les commandes suivantes
        cd tlc-m2e/api/API-f305c7a02a5e4cc90f5b079515e8d3e0b558ca32/
        cp .env.example .env
        mkdir -p docker/nginx/certs
        openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
          -keyout docker/nginx/certs/server.key \
          -out docker/nginx/certs/server.crt \
          -subj "/C=FR/ST=IDF/L=Paris/O=Bastivan/OU=IT/CN=localhost"

    - name: Build and start Docker services
      run: |
        cd tlc-m2e/api/API-f305c7a02a5e4cc90f5b079515e8d3e0b558ca32/
        docker compose up -d --build

    - name: Wait for services to be ready
      run: sleep 20 # Augmenté car MongoDB/MariaDB peuvent être longs à l'init

    - name: Check container status
      run: |
        cd tlc-m2e/api/API-f305c7a02a5e4cc90f5b079515e8d3e0b558ca32/
        docker compose ps
        # Affiche les logs en cas d'échec immédiat
        docker compose logs app

    - name: Run a basic test against the API
      run: |
        # Test de connexion locale (le port 443 doit être mappé dans docker-compose.yml)
        response=$(curl -k -s -o /dev/null -w "%{http_code}" https://localhost/)
        echo "HTTP Response code: $response"

        if [ "$response" = "000" ]; then
          echo "Failed to connect to Nginx"
          cd tlc-m2e/api/API-f305c7a02a5e4cc90f5b079515e8d3e0b558ca32/
          docker compose logs
          exit 1
        fi

    - name: Stop Docker services
      if: always()
      run: |
        cd tlc-m2e/api/API-f305c7a02a5e4cc90f5b079515e8d3e0b558ca32/
        docker compose down
