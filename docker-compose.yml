version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tlc-app
    restart: unless-stopped
    environment:
      APP_ENV: local
      APP_DEBUG: true
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_DATABASE: tlc
      DB_USERNAME: tlc_user
      DB_PASSWORD: password
      REDIS_HOST: redis
    networks:
      - tlc-net
    volumes:
      - .:/var/www/html

  web:
    image: nginx:alpine
    container_name: tlc-web
    restart: unless-stopped
    ports:
      - "8080:80"
      - "443:443"
    volumes:
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
      - ./docker/nginx/certs:/etc/nginx/certs
      - .:/var/www/html
    depends_on:
      - app
    networks:
      - tlc-net

  db:
    image: mariadb:10.6
    container_name: tlc-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: tlc
      MYSQL_USER: tlc_user
      MYSQL_PASSWORD: password
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - tlc-net

  redis:
    image: redis:alpine
    container_name: tlc-redis
    restart: always
    networks:
      - tlc-net

networks:
  tlc-net:
    driver: bridge

volumes:
  db_data:
